server {
    listen 80;
    server_name 192.162.2.34;

    # Logs
    access_log /var/log/nginx/gestor-moodle-access.log;
    error_log  /var/log/nginx/gestor-moodle-error.log;

    # Tamaño máximo de subida
    client_max_body_size 10M;

    # Raíz: no redirige, devuelve 404
    location = / {
        return 404;
    }

    location /moodle/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /moodle;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # Archivos estáticos
    location /moodle/static/ {
        alias /opt/gestor-moodle/moodle-admin-app/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
