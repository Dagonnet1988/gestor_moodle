{% extends "base.html" %}

{% block title %}Inscribir Usuario - Gestión Moodle{% endblock %}
{% block page_title %}Inscribir Usuario{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-2 mb-4">
    <a href="{{ url_for('courses.index') }}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h4 class="mb-0"><i class="bi bi-person-plus"></i> Inscribir Usuario en Curso</h4>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="POST" action="{{ url_for('enrolments.enrol') }}">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="course_id" class="form-label">Curso <span class="text-danger">*</span></label>
                    <select class="form-select" id="course_id" name="course_id" required>
                        <option value="">Seleccionar curso...</option>
                        {% for course in courses %}
                        <option value="{{ course.id }}" {% if course.id == selected_course_id %}selected{% endif %}>
                            {{ course.fullname }} ({{ course.shortname }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="user_id" class="form-label">Usuario <span class="text-danger">*</span></label>
                    <select class="form-select" id="user_id" name="user_id" required>
                        <option value="">Seleccionar usuario...</option>
                        {% for user in users %}
                        <option value="{{ user.id }}">
                            {{ user.firstname }} {{ user.lastname }} ({{ user.username }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg"></i> Inscribir
                </button>
                <a href="{{ url_for('courses.index') }}" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
